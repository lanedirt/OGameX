services:

  # MariaDB Service
  ogamex-db:
    image: mariadb:11.3.2-jammy
    restart: unless-stopped
    tty: true
    volumes:
     - ogame-dbdata:/var/lib/mysql
     - ./mysql/my.cnf:/etc/mysql/my.cnf
    ports:
      - "${DB_EXTERNAL_PORT:-3306}:3306"
    environment:
      MARIADB_DATABASE: laravel
      MARIADB_ROOT_PASSWORD: toor
      SERVICE_TAGS: dev
      SERVICE_NAME: mysql
    networks:
      app-network:
        aliases:
          - ogame-db

  # PHP Service
  ogamex-app:
    volumes:
      - ./:/var/www
      - ./php/local.ini:/usr/local/etc/php/conf.d/local.ini
    build:
      context: .
      dockerfile: Dockerfile
      args:
        OPCACHE_ENABLE: "0"  # Disable opcache for development
        USE_USER: ${USE_USER_ARG:-yes}  # Defaults to "yes". Set to "no" for GitHub Actions.
    restart: unless-stopped
    tty: true
    environment:
      CONTAINER_ROLE: app
      SERVICE_NAME: app
      SERVICE_TAGS: dev
    working_dir: /var/www
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000 || [ $? -eq 56 ]"]
      interval: 10s
      timeout: 6s
      retries: 60
    networks:
      - app-network
    depends_on:
      - ogamex-db

  # Scheduler
  ogamex-scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ./:/var/www
      - ./php/local.ini:/usr/local/etc/php/conf.d/local.ini
    environment:
      CONTAINER_ROLE: scheduler
    networks:
      - app-network
    depends_on:
      ogamex-app:
        condition: service_healthy

  # Queue
  ogamex-queue-worker:
    # Opt-in service: a live worker drains the fleet-arrival queues, which would
    # race the test suite (it inspects queued jobs on the same database). Kept out
    # of the default `docker compose up` so CI and a bare local stack have exclusive
    # control of the queue. Start it explicitly to run the fleet workers locally:
    #   docker compose --profile queue up -d
    # Production runs the worker unconditionally from docker-compose.prod.yml.
    profiles: ["queue"]
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ./:/var/www
      - ./php/local.ini:/usr/local/etc/php/conf.d/local.ini
    environment:
      CONTAINER_ROLE: queue
      # Fleet-arrival worker pools. The light pool is reserved for light traffic
      # (transports, deployments, returns) so it is never blocked by battles; the
      # heavy pool runs battles and backfills light work when idle. More workers =
      # more planet destinations processed in parallel.
      QUEUE_WORKERS_LIGHT: ${QUEUE_WORKERS_LIGHT:-2}
      QUEUE_WORKERS_HEAVY: ${QUEUE_WORKERS_HEAVY:-3}
    networks:
      - app-network
    depends_on:
      ogamex-app:
        condition: service_healthy

  # Nginx Service
  ogamex-webserver:
    image: nginx:alpine
    restart: unless-stopped
    tty: true
    volumes:
      - ./:/var/www:cached
      - ./nginx/conf.d/:/etc/nginx/conf.d/
      - ./nginx/ssl/:/etc/nginx/ssl/
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    networks:
      - app-network
    depends_on:
      ogamex-app:
        condition: service_healthy

  # Reverb WebSocket Server
  ogamex-reverb:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ./:/var/www
      - ./php/local.ini:/usr/local/etc/php/conf.d/local.ini
    environment:
      CONTAINER_ROLE: reverb
    ports:
      - "${REVERB_SERVER_PORT:-8090}:${REVERB_SERVER_PORT:-8090}"
    networks:
      - app-network
    depends_on:
      ogamex-app:
        condition: service_healthy

  # PhpMyAdmin
  ogamex-phpmyadmin:
    image: phpmyadmin
    restart: always
    ports:
      - "${PHPMYADMIN_PORT:-8080}:80"
    environment:
      - PMA_ARBITRARY=1
      - PMA_HOST=ogame-db
      - UPLOAD_LIMIT=1G
    networks:
      - app-network

# Docker Networks
networks:
  app-network:
    driver: bridge

# Volumes
volumes:
  ogame-dbdata:
    driver: local
